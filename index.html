<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eske w nan 40 lan?</title>

  <!-- ✅ Content Security Policy -->

        content="default-src 'self'; 
                 script-src 'self' https://unpkg.com https://www.webrtc-experiment.com https://cdn.webrtc-experiment.com;

                 font-src 'self' https://fonts.gstatic.com;

  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <!-- Safari modal si Chrome sou iPhone -->
  <div id="safari-modal" class="hidden">
    <div id="safari-modal-content">
      <h2>⚠️ Enpòtan</h2>
      <p>Chrome sou iPhone pa sipòte anrejistreman videyo.<br>
         Tanpri ouvri sit sa a nan Safari pou ou ka kontinye anrejistre.</p>
      <button id="close-safari-modal">Mwen konprann</button>
    </div>
  </div>

  <!-- Kamera interface ap parèt otomatik -->
  <section id="camera-interface"></section>
