<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evènman Legliz</title>
    <link rel="stylesheet" href="styles.css"> <!-- Mete non fichye ou aktyèl la -->
</head>
<body>

    <!-- Background ak tèks sou li -->
    <section class="first-background">
        <img src="imaBack.JPG" alt="Premye Background">
        <div class="text-overlay">
            ESKE W NAN 40 LAN?<br>CHALLENGE
        </div>
    </section>

    <!-- Dezyèm Background ak Script -->
    <section class="second-background">
        <img src="imaBack2.JPG" alt="Dezyèm Background" class="background-image">
        <div class="overlay">
            <div class="script-container">
                <h1>SCRIPT</h1>
                <div class="script-text">
                    <!-- Scripts pou 3 lang yo -->
                    <!-- ... ou ka mete tout sa ou te gen deja la -->
                </div>
            </div>
        </div>
    </section>

    <!-- Kamera & Bouton -->
    <div class="camera-container" id="cameraScreen" style="display: none;">
        <video id="video" autoplay playsinline></video>
        <img id="frame" class="video-frame" alt="Frame">
        <canvas id="canvas"></canvas>
        <button id="startRecording">🔴 Rekòde</button>
        <button id="stopRecording" disabled>⏹️ Stop</button>
        <video id="recordedVideo" controls style="display: none;"></video>
        <button id="downloadVideo" style="display: none;">📥 Telechaje</button>
    </div>

    <script>
        function openCamera(language) {
            const frameImage = {
                'fr': 'Frame-fr.png',
                'en': 'Frame-en.png',
                'ht': 'Frame-ht.png'
            };

            const cameraScreen = document.getElementById('cameraScreen');
            const frame = document.getElementById('frame');
            const video = document.getElementById('video');

            frame.src = frameImage[language];
            cameraScreen.style.display = 'flex';

            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    video.srcObject = stream;
                })
                .catch(error => {
                    console.error('Error accessing the camera:', error);
                    alert('Nou pa ka jwenn aksè ak kamera ou.');
                });
        }
    </script>

</body>
</html>
